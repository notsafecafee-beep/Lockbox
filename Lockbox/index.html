<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowerlock Puzzle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 id="question">Which flower was born first?</h1>

  <div id="lock-container">
    <img id="lock" src="https://cdn-icons-png.flaticon.com/512/8983/8983096.png" alt="lock">
  </div>

  <div id="slots">
    <div class="slot">
      <button class="up">▲</button>
      <img class="flower" src="https://i.postimg.cc/wTcGnCbF/Screenshot-2026-04-26-215803.png" alt="Ada">
      <button class="down">▼</button>
    </div>

    <div class="slot">
      <button class="up">▲</button>
      <img class="flower" src="https://i.postimg.cc/J06ZRJ4T/Screenshot-2026-04-26-220118.png" alt="Grace">
      <button class="down">▼</button>
    </div>

    <div class="slot">
      <button class="up">▲</button>
      <img class="flower" src="https://i.postimg.cc/3NSm3pJf/Screenshot-2026-04-26-220415.png" alt="Hedy">
      <button class="down">▼</button>
    </div>

    <div class="slot">
      <button class="up">▲</button>
      <img class="flower" src="https://i.postimg.cc/2ychCv8X/Screenshot-2026-04-26-220703.png" alt="Rosalind">
      <button class="down">▼</button>
    </div>
  </div>

  <button id="enter">ENTER</button>

  <div id="reveal" class="hidden">
    <p>ArEn’T you juSt so smArT?</p>
    <div id="audioButton">
  <img src="audioIcon.png" alt="play audio">
</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
